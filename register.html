<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация бота - SAMP Panel</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3e 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: rgba(20, 20, 50, 0.95);
            padding: 40px;
            border-radius: 20px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.1);
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #e94560;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #8892b0;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #2a2a5e;
            border-radius: 10px;
            background: #0d0d1a;
            color: #fff;
            font-size: 1em;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #e94560;
        }
        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #e94560, #c73652);
            color: #fff;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(233, 69, 96, 0.4);
        }
        .btn-back {
            background: linear-gradient(135deg, #2a2a6e, #1a1a4e);
            margin-top: 10px;
        }
        .btn-back:hover {
            box-shadow: 0 10px 30px rgba(42, 42, 110, 0.4);
        }
        #message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
        }
        .success {
            background: rgba(45, 106, 79, 0.3);
            border: 1px solid #2d6a4f;
            color: #4caf50;
        }
        .error {
            background: rgba(233, 69, 96, 0.2);
            border: 1px solid #c73652;
            color: #ff6b6b;
        }
        .info-text {
            font-size: 0.85em;
            color: #8892b0;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 Регистрация бота</h1>
        
        <form id="registerForm">
            <div class="form-group">
                <label>👤 Никнейм бота</label>
                <input type="text" id="nickname" placeholder="Введите никнейм" required>
                <div class="info-text">Используется для авторизации бота</div>
            </div>
            
            <div class="form-group">
                <label>🔒 Пароль</label>
                <input type="password" id="password" placeholder="Придумайте пароль" required>
                <div class="info-text">Минимум 4 символа</div>
            </div>
            
            <div class="form-group">
                <label>🌐 IP сервера SAMP</label>
                <input type="text" id="server_ip" placeholder="127.0.0.1:7777" value="127.0.0.1:7777" required>
                <div class="info-text">IP:Порт сервера, куда бот будет заходить</div>
            </div>
            
            <button type="submit" class="btn">🚀 Зарегистрировать бота</button>
        </form>
        
        <div id="message"></div>
        
        <button class="btn btn-back" onclick="window.location.href='/'">← На главную</button>
    </div>
    
    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const nickname = document.getElementById('nickname').value.trim();
            const password = document.getElementById('password').value;
            const server_ip = document.getElementById('server_ip').value.trim();
            
            if (!nickname || !password || !server_ip) {
                showMessage('Заполните все поля!', 'error');
                return;
            }
            
            if (password.length < 4) {
                showMessage('Пароль должен быть минимум 4 символа!', 'error');
                return;
            }
            
            try {
                const formData = new FormData();
                formData.append('nickname', nickname);
                formData.append('password', password);
                formData.append('server_ip', server_ip);
                
                const response = await fetch('/api/register', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showMessage(`✅ Бот "${nickname}" успешно зарегистрирован! ID: ${data.bot_id}`, 'success');
                    document.getElementById('registerForm').reset();
                } else {
                    showMessage(`❌ Ошибка: ${data.detail}`, 'error');
                }
            } catch (error) {
                showMessage('❌ Ошибка соединения с сервером', 'error');
                console.error(error);
            }
        });
        
        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = type;
            msg.style.display = 'block';
            
            setTimeout(() => {
                msg.style.display = 'none';
            }, 5000);
        }
    </script>
</body>
</html>
